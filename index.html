<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce Website</title>
    <link href="./assets/css/output.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <div class="sale flex h-14 w-full items-center justify-center bg-black">
        <p class="flex items-center gap-3 text-white">
          <span>Get 25% OFF on your first order.</span>
          <a href="#" class="text-white">Order Now</a>
        </p>
      </div>
      <div class="mx-[162px] mt-[22.5px] flex items-center justify-between">
        <div class="flex items-center gap-8">
          <div class="logo">
            <a href="./index.html" class="flex items-center gap-2">
              <img src="./assets/icons/Logomark.png" alt="Ecommerce logo" />
              <span>Ecommerce</span>
            </a>
          </div>
          <nav class="list flex items-center gap-8 ml-[110px]">
            <a href="#">Home</a>
            <div class="categories flex items-center">
              <a href="#">Categories</a>
              <a href="#" class="ml-[14px]"
                ><img src="./assets/icons/Chevron Down.svg" alt=""
              /></a>
            </div>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </nav>
        </div>
        <div class="flex items-center">
          <div class="searchbar flex items-center ml-29.75 mr-8">
            <input
              type="search"
              name="searchbar"
              placeholder="Search"
              class="border"
            />
          </div>
          <div class="icons flex items-center gap-8">
            <a href="#"><img src="./assets/icons/Cart.svg" alt="Cart" /></a>
            <a href="#"><img src="./assets/icons/User.svg" alt="User" /></a>
          </div>
        </div>
      </div>
    </header>
    <main class="mt-[20px]">
      <section class="mt-[20px] min-h-[620px] w-full bg-[#F6F6F6]">
        <div class="mx-[162px] flex min-h-[620px] items-center justify-between">
          <div class="max-w-[520px]">
            <h1
              class="mt-[180px] text-[64px] leading-none font-semibold text-[#13192b]"
            >
              Fresh Arrivals Online
            </h1>
            <p class="mt-[28px] text-[32px] text-[#5c6273]">
              Discover Our Newest Collection Today.
            </p>
            <a
              href="#"
              class="mt-[64px] inline-flex items-center gap-4 rounded-[8px] bg-[#0E1422] px-[32px] py-[18px] text-[28px] text-white"
            >
              <span>View Collection</span>
              <img src="./assets/icons/Arrow Right.svg" alt="Arrow right" />
            </a>
          </div>
          <div
            class="relative flex h-[620px] w-[700px] items-end justify-center"
          >
            <img
              src="./assets/imgs/Ellipse.png"
              alt=""
              class="absolute right-0 bottom-0 w-[600px] max-w-none"
            />
            <img
              src="./assets/imgs/Hero Image.png"
              alt=""
              class="absolute right-[60px] bottom-0 w-[420px] max-w-none"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
