<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce Website</title>
    <link href="./assets/css/output.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <div class="sale flex h-14 w-full items-center justify-center bg-black">
        <p class="flex items-center gap-3 text-white">
          <span>Get 25% OFF on your first order.</span>
          <a href="#" class="text-white">Order Now</a>
        </p>
      </div>
      <div class="mx-[162px] mt-[22.5px] flex items-center justify-between">
        <div class="flex items-center gap-8">
          <div class="logo">
            <a href="./index.html" class="flex items-center gap-2">
              <img src="./assets/icons/Logomark.png" alt="Ecommerce logo" />
              <span>Ecommerce</span>
            </a>
          </div>
          <nav class="list flex items-center gap-8 ml-[110px]">
            <a href="#">Home</a>
            <div class="categories flex items-center">
              <a href="#">Categories</a>
              <a href="#" class="ml-[14px]"
                ><img src="./assets/icons/Chevron Down.svg" alt=""
              /></a>
            </div>
            <a href="#">About</a>
            <a href="#">Contact</a>
          </nav>
        </div>
        <div class="flex items-center">
          <div class="searchbar flex items-center ml-29.75 mr-8">
            <input
              type="search"
              name="searchbar"
              placeholder="Search"
              class="border"
            />
          </div>
          <div class="icons flex items-center gap-8">
            <a href="#"><img src="./assets/icons/Cart.svg" alt="Cart" /></a>
            <a href="#"><img src="./assets/icons/User.svg" alt="User" /></a>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
