<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link href="./assets/css/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="min-h-screen bg-[#F9FAFB] text-[#13192b]"
    style="font-family: &quot;Inter&quot;, sans-serif"
  >
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <section
        class="w-full max-w-[640px] rounded-[20px] border border-[#E6E7E8] bg-white px-6 py-12 shadow-sm sm:px-[52px] sm:py-[56px]"
      >
        <div class="flex items-center justify-center gap-4">
          <img
            src="./assets/icons/Logomark.png"
            alt="Admin logo"
            class="h-[56px] w-[56px]"
          />
          <h1 class="text-[56px] font-semibold leading-none tracking-[-1.12px]">
            Admin
          </h1>
        </div>

        <form class="mt-[120px] space-y-[32px]">
          <div>
            <label
              for="admin-email"
              class="mb-[12px] block text-[24px] text-[#4b5563]"
              >Email</label
            >
            <input
              id="admin-email"
              type="email"
              class="h-[72px] w-full rounded-[14px] border border-[#E6E7E8] px-[20px] text-[20px] outline-none"
            />
          </div>

          <div>
            <label
              for="admin-password"
              class="mb-[12px] block text-[24px] text-[#4b5563]"
              >Password</label
            >
            <input
              id="admin-password"
              type="password"
              class="h-[72px] w-full rounded-[14px] border border-[#E6E7E8] px-[20px] text-[20px] outline-none"
            />
          </div>

          <button
            type="submit"
            class="mt-[32px] flex h-[72px] w-full items-center justify-center rounded-[12px] bg-[#111827] text-[24px] font-medium text-white"
          >
            Login
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
